<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07090f"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4aaeff"/>
      <stop offset="100%" style="stop-color:#2dd4bf"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Radial glow -->
  <radialGradient id="glow" cx="30%" cy="50%" r="60%">
    <stop offset="0%" style="stop-color:#4aaeff;stop-opacity:0.08"/>
    <stop offset="100%" style="stop-color:#4aaeff;stop-opacity:0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top accent line -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>

  <!-- Left decorative column -->
  <rect x="60" y="60" width="1" height="510" fill="#1e2736" opacity="0.8"/>
  <rect x="60" y="60" width="1" height="180" fill="url(#accent)" opacity="0.5"/>

  <!-- Content area -->
  <g transform="translate(120, 0)">
    <!-- Status pill -->
    <rect x="0" y="120" width="220" height="28" rx="14" fill="#0d1117" stroke="#1e2736" stroke-width="1"/>
    <circle cx="18" cy="134" r="4" fill="#2dd4bf"/>
    <text x="32" y="139" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8899b4" font-weight="500" letter-spacing="0.5">Available · olaflaitinen.dev</text>

    <!-- Name -->
    <text x="0" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="72" fill="#e8edf5" font-weight="600" letter-spacing="-2">Olaf Laitinen</text>

    <!-- Title gradient effect via layering -->
    <text x="0" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="30" fill="#4aaeff" font-weight="500" letter-spacing="-0.5">AI Leader · Researcher · Engineer</text>

    <!-- Description -->
    <text x="0" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8899b4" font-weight="400">Medical AI · Explainable AI · Multimodal Systems · Bioinformatics · Evaluation</text>

    <!-- Tags row -->
    <g transform="translate(0, 420)">
      <rect x="0" y="0" width="130" height="28" rx="6" fill="#111827" stroke="#1e2736"/>
      <text x="10" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8899b4">Skolyn CTO</text>

      <rect x="142" y="0" width="160" height="28" rx="6" fill="#111827" stroke="#1e2736"/>
      <text x="152" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8899b4">ex-Google Health AI</text>

      <rect x="314" y="0" width="90" height="28" rx="6" fill="#111827" stroke="#1e2736"/>
      <text x="324" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8899b4">ex-FCAI</text>

      <rect x="416" y="0" width="120" height="28" rx="6" fill="#111827" stroke="#1e2736"/>
      <text x="426" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8899b4">Dual PhD</text>
    </g>
  </g>

  <!-- Right decorative element -->
  <g transform="translate(850, 150)" opacity="0.15">
    <circle cx="150" cy="150" r="140" fill="none" stroke="#4aaeff" stroke-width="0.5"/>
    <circle cx="150" cy="150" r="100" fill="none" stroke="#4aaeff" stroke-width="0.5"/>
    <circle cx="150" cy="150" r="60" fill="none" stroke="#4aaeff" stroke-width="0.5"/>
    <circle cx="150" cy="150" r="5" fill="#4aaeff"/>
    <line x1="150" y1="10" x2="150" y2="290" stroke="#4aaeff" stroke-width="0.5"/>
    <line x1="10" y1="150" x2="290" y2="150" stroke="#4aaeff" stroke-width="0.5"/>
    <line x1="51" y1="51" x2="249" y2="249" stroke="#4aaeff" stroke-width="0.3"/>
    <line x1="249" y1="51" x2="51" y2="249" stroke="#4aaeff" stroke-width="0.3"/>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0d1117" opacity="0.6"/>
  <text x="120" y="612" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#4a5a72">olaflaitinen.dev</text>
  <line x1="0" y1="590" x2="1200" y2="590" stroke="#1e2736" stroke-width="1"/>
</svg>
